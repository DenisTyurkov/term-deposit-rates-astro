name: Daily rate scrape

# Scrapes interest.co.nz once a day, appends the new rows to db/rates.db, and
# commits the file. Cloudflare Pages' GitHub integration then auto-builds and
# deploys the static site from the new commit.

on:
  schedule:
    # 17:30 UTC ≈ 5:30am NZST (UTC+12) / 6:30am NZDT (UTC+13). GitHub cron is
    # UTC-only and can't follow NZ daylight saving — close enough for a daily
    # rebuild; adjust if you need exactly 5:30am year-round.
    - cron: "30 17 * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Never run two scrapes at once.
concurrency:
  group: daily-scrape
  cancel-in-progress: false

permissions:
  contents: write # needed to commit db/rates.db back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Scrape rates → db/rates.db
        run: npm run scrape

      - name: Verify the site still builds
        run: npm run build

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- db/rates.db; then
            echo "No rate changes — nothing to commit."
          else
            git add db/rates.db
            git commit -m "chore: daily rate scrape ($(date -u +%Y-%m-%d))"
            git push
          fi
